<!DOCTYPE html>
<html>
<head>
  <title>로그인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1>로그인</h1>

  {% if form.errors %}
    <p style="color:red;">아이디/비밀번호가 올바르지 않습니다.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <p>
      <label>아이디</label><br>
      {{ form.username }}
    </p>

    <p>
      <label>비밀번호</label><br>
      {{ form.password }}
    </p>

    <button type="submit">로그인</button>

    <input type="hidden" name="next" value="{{ next }}">
  </form>

  <hr>
  <p>관리자 계정이 있으면 그걸로 로그인하면 됩니다.</p>
</body>
</html>
