{% extends 'core/base.html' %}

{% block title %}로그인{% endblock %}

{% block content %}

<section class="card">
  <h1 class="section-title">로그인</h1>
  <p>학습 기록, 오답노트, 통계를 이어서 확인하려면 로그인하세요.</p>
</section>

<section class="card">
  {% if form.errors %}
    <div class="info-box result-wrong">
      아이디 또는 비밀번호가 올바르지 않습니다. 다시 확인해 주세요.
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="mb-medium">
      <label for="{{ form.username.id_for_label }}"><b>아이디</b></label><br>
      {{ form.username }}
    </div>

    <div class="mb-medium">
      <label for="{{ form.password.id_for_label }}"><b>비밀번호</b></label><br>
      {{ form.password }}
    </div>

    <button type="submit" class="main-button">로그인</button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>
</section>

<section class="card">
  <p>
    아직 계정이 없나요?
    <a href="{% url 'signup' %}" class="sub-link">회원가입하기</a>
  </p>
</section>

{% endblock %}
