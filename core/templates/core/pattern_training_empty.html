{% extends 'core/base.html' %}

{% block title %}훈련 가능한 문제가 없습니다{% endblock %}

{% block content %}

<section class="card">
  <h1 class="section-title">훈련 가능한 문제가 없습니다</h1>

  <div class="info-box">
    <p>
      <b>{{ wrong_pattern.name }}</b> 패턴에는 현재 훈련 가능한 문제가 없습니다.
    </p>
  </div>

  <p>
    저품질 문제를 제외한 뒤 사용할 수 있는 문제가 부족한 상태입니다.
    다른 학습을 먼저 진행하거나, 관리자에게 문제 추가를 요청해 주세요.
  </p>
</section>

<section class="card">
  <a href="{% url 'mission_list' %}" class="main-button">학습 홈으로 돌아가기</a>
  <a href="{% url 'problem_set_list' %}" class="sub-button">문제 세트 보기</a>
</section>

{% endblock %}
